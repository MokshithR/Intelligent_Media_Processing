version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: media_pipeline
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d media_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── API (FastAPI + Alembic migrations on start) ────────────────────────────
  api:
    build: .
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/media_pipeline
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_BYTES: "10485760"
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
      - .:/app  # mount source for --reload in dev; remove in production image
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

  # ── RQ Worker ──────────────────────────────────────────────────────────────
  worker:
    build: .
    command: rq worker --with-scheduler default
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/media_pipeline
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:   # named volume — data persists across restarts
  uploads_data:    # shared between api and worker
