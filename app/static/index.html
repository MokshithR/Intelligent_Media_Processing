<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intake — Vehicle Image Inspection</title>
<meta name="description" content="Real-time vehicle image inspection dashboard. Upload images and get instant quality analysis: blur, brightness, duplicate detection, screenshot check, and plate OCR.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14171A;
    --panel:#1B1F23;
    --panel-raised:#21262B;
    --border:#2A2F35;
    --text:#ECEEF0;
    --text-muted:#8B929A;
    --text-faint:#5B6167;
    --amber:#F5A623;
    --green:#4ADE80;
    --red:#E5595E;
    --blue:#6FA3D8;
    --font-display:'Space Grotesk', sans-serif;
    --font-body:'Inter', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    -webkit-font-smoothing:antialiased;
  }
  @media (prefers-reduced-motion:reduce){
    *{animation-duration:0.001ms !important; transition-duration:0.001ms !important;}
  }

  /* ── Top bar ─────────────────────────────────────────────── */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px;
    border-bottom:1px solid var(--border);
    background:var(--panel);
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:30px; height:30px; border-radius:7px;
    background:linear-gradient(135deg, var(--amber), #d97f1a);
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-mono); font-weight:600; font-size:14px; color:#1a1200;
  }
  .brand-text h1{font-family:var(--font-display); font-size:16px; font-weight:600; letter-spacing:0.01em;}
  .brand-text p{font-size:11.5px; color:var(--text-muted); font-family:var(--font-mono); margin-top:1px;}
  .conn{display:flex; align-items:center; gap:10px;}
  .conn-field{
    display:flex; align-items:center; gap:8px;
    background:var(--panel-raised); border:1px solid var(--border);
    border-radius:8px; padding:6px 10px;
  }
  .conn-field label{font-size:10.5px; color:var(--text-faint); font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.06em;}
  .conn-field input{
    background:transparent; border:none; outline:none; color:var(--text);
    font-family:var(--font-mono); font-size:12.5px; width:170px;
  }
  .dot{width:7px; height:7px; border-radius:50%; background:var(--text-faint); flex-shrink:0;}
  .dot.ok{background:var(--green); box-shadow:0 0 6px rgba(74,222,128,0.6);}
  .dot.bad{background:var(--red); box-shadow:0 0 6px rgba(229,89,94,0.5);}

  /* ── Shell ───────────────────────────────────────────────── */
  .shell{
    display:grid; grid-template-columns:360px 1fr;
    height:calc(100vh - 66px);
  }
  @media (max-width:860px){ .shell{grid-template-columns:1fr; height:auto;} }

  /* ── Sidebar ─────────────────────────────────────────────── */
  .sidebar{
    border-right:1px solid var(--border);
    display:flex; flex-direction:column;
    overflow:hidden;
  }
  .dropzone{
    margin:18px; padding:22px 16px;
    border:1.5px dashed var(--border);
    border-radius:12px;
    text-align:center;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease;
  }
  .dropzone:hover, .dropzone.drag{
    border-color:var(--amber);
    background:rgba(245,166,35,0.05);
  }
  .dropzone svg{width:26px; height:26px; color:var(--text-faint); margin-bottom:10px;}
  .dropzone p{font-size:13px; color:var(--text-muted);}
  .dropzone .hint{font-size:11px; color:var(--text-faint); margin-top:4px; font-family:var(--font-mono);}
  .dropzone input{display:none;}

  .queue-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:0 18px 10px 18px;
  }
  .queue-head h2{
    font-family:var(--font-mono); font-size:11px; text-transform:uppercase;
    letter-spacing:0.08em; color:var(--text-faint); font-weight:500;
  }
  .queue-count{
    font-family:var(--font-mono); font-size:11px; color:var(--text-muted);
    background:var(--panel-raised); border:1px solid var(--border);
    border-radius:20px; padding:1px 8px;
  }
  .queue{
    flex:1; overflow-y:auto; padding:0 12px 18px 12px;
    display:flex; flex-direction:column; gap:6px;
  }
  .queue::-webkit-scrollbar{width:6px;}
  .queue::-webkit-scrollbar-thumb{background:var(--border); border-radius:3px;}

  .empty-state{
    color:var(--text-faint); font-size:12.5px; text-align:center;
    padding:30px 20px; line-height:1.6;
  }

  .ticket{
    display:flex; align-items:center; gap:10px;
    padding:9px 10px;
    border-radius:9px;
    border:1px solid transparent;
    cursor:pointer;
    transition:background .12s ease, border-color .12s ease;
  }
  .ticket:hover{background:var(--panel-raised);}
  .ticket.active{background:var(--panel-raised); border-color:var(--border);}
  .ticket-thumb{
    width:38px; height:38px; border-radius:6px; flex-shrink:0;
    background:#0f1113; object-fit:cover;
    border:1px solid var(--border);
  }
  .ticket-body{flex:1; min-width:0;}
  .ticket-id{
    font-family:var(--font-mono); font-size:11.5px; color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .ticket-meta{display:flex; align-items:center; gap:6px; margin-top:2px;}
  .status-chip{
    font-family:var(--font-mono); font-size:9.5px; text-transform:uppercase;
    letter-spacing:0.05em; padding:1.5px 6px; border-radius:20px;
    border:1px solid; line-height:1.5;
  }
  .status-chip.pending{color:var(--text-muted); border-color:var(--border); background:var(--panel-raised);}
  .status-chip.processing{color:var(--amber); border-color:rgba(245,166,35,0.35); background:rgba(245,166,35,0.08);}
  .status-chip.completed{color:var(--green); border-color:rgba(74,222,128,0.35); background:rgba(74,222,128,0.08);}
  .status-chip.failed{color:var(--red); border-color:rgba(229,89,94,0.35); background:rgba(229,89,94,0.08);}
  .issue-count{font-size:10px; color:var(--text-faint); font-family:var(--font-mono);}

  /* ── Main panel ──────────────────────────────────────────── */
  .main{ overflow-y:auto; padding:28px 32px 60px 32px; }
  .main::-webkit-scrollbar{width:8px;}
  .main::-webkit-scrollbar-thumb{background:var(--border); border-radius:4px;}

  .placeholder{
    height:100%; min-height:400px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:var(--text-faint); text-align:center; gap:10px;
  }
  .placeholder svg{width:36px; height:36px; opacity:0.5;}
  .placeholder p{font-size:13.5px; max-width:280px; line-height:1.6;}

  .detail-head{display:flex; gap:20px; align-items:flex-start; margin-bottom:26px;}
  .detail-image-wrap{
    width:180px; height:180px; border-radius:12px; overflow:hidden;
    border:1px solid var(--border); background:#0f1113; flex-shrink:0;
    position:relative;
  }
  .detail-image-wrap img{width:100%; height:100%; object-fit:cover; display:block;}
  .scan-line{
    position:absolute; left:0; right:0; height:2px;
    background:linear-gradient(90deg, transparent, var(--amber), transparent);
    box-shadow:0 0 8px 1px rgba(245,166,35,0.7);
    animation:sweep 1.8s ease-in-out infinite;
  }
  @keyframes sweep{
    0%{ top:0%; opacity:0; }
    10%{ opacity:1; }
    90%{ opacity:1; }
    100%{ top:100%; opacity:0; }
  }

  .detail-info{flex:1; min-width:0; padding-top:2px;}
  .detail-eyebrow{
    font-family:var(--font-mono); font-size:11px; color:var(--text-faint);
    text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;
  }
  .detail-title{font-family:var(--font-display); font-size:19px; font-weight:600; word-break:break-word;}
  .detail-status-row{display:flex; align-items:center; gap:10px; margin-top:12px;}
  .detail-meta-grid{
    display:grid; grid-template-columns:repeat(3, auto); gap:20px;
    margin-top:16px;
  }
  .meta-item .k{font-size:10.5px; color:var(--text-faint); font-family:var(--font-mono); text-transform:uppercase; letter-spacing:0.05em;}
  .meta-item .v{font-size:12.5px; color:var(--text-muted); font-family:var(--font-mono); margin-top:3px;}

  .fail-banner{
    margin-top:14px; padding:10px 14px; border-radius:8px;
    background:rgba(229,89,94,0.08); border:1px solid rgba(229,89,94,0.3);
    color:var(--red); font-size:12.5px; font-family:var(--font-mono);
  }

  .section-label{
    font-family:var(--font-mono); font-size:11px; text-transform:uppercase;
    letter-spacing:0.08em; color:var(--text-faint); margin:8px 0 14px 0;
  }

  /* ── Inspection tag cards ────────────────────────────────── */
  .tags{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr));
    gap:14px;
  }
  .tag{
    position:relative;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:16px 16px 14px 16px;
    overflow:hidden;
  }
  .tag::before{
    content:"";
    position:absolute; top:0; left:0; right:0; height:3px;
  }
  .tag.pass::before{background:var(--green);}
  .tag.fail::before{background:var(--amber);}
  .tag.error::before{background:var(--red);}
  .tag-top{display:flex; align-items:flex-start; justify-content:space-between; gap:8px;}
  .tag-name{font-family:var(--font-display); font-size:13.5px; font-weight:600;}
  .stamp{
    font-family:var(--font-mono); font-size:9.5px; font-weight:600;
    letter-spacing:0.08em; padding:3px 8px; border-radius:5px;
    border:1.5px solid; transform:rotate(2deg); flex-shrink:0;
  }
  .tag.pass .stamp{color:var(--green); border-color:var(--green);}
  .tag.fail .stamp{color:var(--amber); border-color:var(--amber);}
  .tag.error .stamp{color:var(--red); border-color:var(--red);}

  .tag-score-row{display:flex; align-items:center; gap:8px; margin-top:12px;}
  .score-bar{flex:1; height:5px; border-radius:3px; background:var(--panel-raised); overflow:hidden;}
  .score-fill{height:100%; border-radius:3px;}
  .tag.pass .score-fill{background:var(--green);}
  .tag.fail .score-fill{background:var(--amber);}
  .tag.error .score-fill{background:var(--red);}
  .score-num{font-family:var(--font-mono); font-size:11.5px; color:var(--text-muted); width:34px; text-align:right;}

  .tag-detail{
    margin-top:11px; font-size:12px; color:var(--text-muted); line-height:1.55;
  }
  .tag-raw{
    margin-top:10px; padding-top:10px; border-top:1px dashed var(--border);
    font-family:var(--font-mono); font-size:10.5px; color:var(--text-faint);
    word-break:break-all;
  }

  /* ── Issues summary banner ───────────────────────────────── */
  .issues-banner{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    margin-bottom:18px; padding:12px 16px; border-radius:9px;
    background:rgba(245,166,35,0.06); border:1px solid rgba(245,166,35,0.2);
  }
  .issues-banner.clean{
    background:rgba(74,222,128,0.05); border-color:rgba(74,222,128,0.2);
  }
  .issues-banner .ib-label{
    font-family:var(--font-mono); font-size:11px; font-weight:600;
    text-transform:uppercase; letter-spacing:0.06em;
  }
  .issues-banner.clean .ib-label{color:var(--green);}
  .issues-banner:not(.clean) .ib-label{color:var(--amber);}
  .issue-pill{
    font-family:var(--font-mono); font-size:10px;
    padding:2px 8px; border-radius:20px;
    background:rgba(229,89,94,0.12); border:1px solid rgba(229,89,94,0.35);
    color:var(--red);
  }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(12px);
    background:var(--panel-raised); border:1px solid var(--border);
    color:var(--text); font-size:12.5px; padding:10px 16px; border-radius:9px;
    opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease;
    font-family:var(--font-mono); z-index:50;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast.err{border-color:rgba(229,89,94,0.4); color:var(--red);}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">IM</div>
    <div class="brand-text">
      <h1>Intake</h1>
      <p>vehicle image inspection pipeline</p>
    </div>
  </div>
  <div class="conn">
    <div class="conn-field">
      <label>api</label>
      <input id="apiBase" value="" spellcheck="false" placeholder="http://localhost:8000">
    </div>
    <span class="dot" id="connDot" title="connection status"></span>
  </div>
</div>

<div class="shell">
  <aside class="sidebar">
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept="image/*" aria-label="Upload vehicle image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 16V4M12 4l-4 4M12 4l4 4" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <p>Drop a vehicle photo, or click to browse</p>
      <div class="hint">JPG · PNG · WebP · up to 10 MB</div>
    </div>

    <div class="queue-head">
      <h2>Queue</h2>
      <span class="queue-count" id="queueCount">0</span>
    </div>
    <div class="queue" id="queue">
      <div class="empty-state">Nothing uploaded yet. Once you add an image it'll show up here and update live as it's processed.</div>
    </div>
  </aside>

  <main class="main" id="main">
    <div class="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>
      <p>Select an image from the queue to see its inspection results here.</p>
    </div>
  </main>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
const $ = sel => document.querySelector(sel);

// ── State ────────────────────────────────────────────────────────────────────
const state = {
  images: {},     // id -> {id, filename, thumb, status, failure_reason, results}
  order: [],      // ids in upload order (most recent first)
  selectedId: null,
  pollers: {}     // id -> interval handle
};

// ── API base: auto-detect when served from FastAPI, otherwise configurable ───
const apiBaseInput = $('#apiBase');
const connDot = $('#connDot');

function apiBase() {
  const v = apiBaseInput.value.trim().replace(/\/$/, '');
  return v || window.location.origin;   // if blank, same origin (served by FastAPI)
}

// ── Connection health check ──────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(apiBase() + '/health', { signal: AbortSignal.timeout(3000) });
    connDot.className = 'dot ' + (r.ok ? 'ok' : 'bad');
  } catch (e) {
    connDot.className = 'dot bad';
  }
}

// ── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, isErr) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.toggle('err', !!isErr);
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3200);
}

// ── Upload ───────────────────────────────────────────────────────────────────
const dropzone = $('#dropzone');
const fileInput = $('#fileInput');

dropzone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) uploadFile(e.target.files[0]);
  fileInput.value = '';
});
['dragenter', 'dragover'].forEach(ev => dropzone.addEventListener(ev, e => {
  e.preventDefault(); dropzone.classList.add('drag');
}));
['dragleave', 'drop'].forEach(ev => dropzone.addEventListener(ev, e => {
  e.preventDefault(); dropzone.classList.remove('drag');
}));
dropzone.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (f) uploadFile(f);
});

function readAsDataURL(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function uploadFile(file) {
  if (!file.type.startsWith('image/')) {
    showToast('Only image files are accepted', true);
    return;
  }
  const thumb = await readAsDataURL(file);
  const fd = new FormData();
  fd.append('file', file);

  try {
    const r = await fetch(apiBase() + '/images', { method: 'POST', body: fd });
    if (!r.ok) {
      let detail = 'Upload rejected (' + r.status + ')';
      try { const body = await r.json(); detail = body.detail || detail; } catch (_) {}
      showToast(detail, true);
      return;
    }
    const data = await r.json();
    const id = data.id;
    state.images[id] = {
      id,
      filename: file.name,
      thumb,
      status: data.status || 'pending',
      failure_reason: null,
      results: null
    };
    state.order.unshift(id);
    renderQueue();
    selectImage(id);
    pollStatus(id);
    showToast('Uploaded — processing queued');
  } catch (err) {
    showToast('Could not reach API — check the URL above', true);
    connDot.className = 'dot bad';
  }
}

// ── Polling ──────────────────────────────────────────────────────────────────
function pollStatus(id) {
  if (state.pollers[id]) return;
  state.pollers[id] = setInterval(async () => {
    try {
      const r = await fetch(apiBase() + '/images/' + id + '/status');
      if (!r.ok) return;
      const data = await r.json();
      const img = state.images[id];
      if (!img) return;
      img.status = data.status;
      img.failure_reason = data.failure_reason || null;

      if (data.status === 'completed') {
        clearInterval(state.pollers[id]);
        delete state.pollers[id];
        // Fetch full results
        const rr = await fetch(apiBase() + '/images/' + id + '/results');
        if (rr.ok) img.results = await rr.json();
        const issueCount = img.results ? (img.results.issues_found || []).length : 0;
        showToast(`Analysis complete — ${issueCount} issue${issueCount === 1 ? '' : 's'} found`);
      } else if (data.status === 'failed') {
        clearInterval(state.pollers[id]);
        delete state.pollers[id];
        showToast(img.filename + ' — processing failed', true);
      }
      renderQueue();
      if (state.selectedId === id) renderDetail(id);
    } catch (e) { /* transient — keep polling */ }
  }, 1500);
}

// ── Queue render ─────────────────────────────────────────────────────────────
function renderQueue() {
  const q = $('#queue');
  $('#queueCount').textContent = state.order.length;
  if (state.order.length === 0) {
    q.innerHTML = '<div class="empty-state">Nothing uploaded yet. Once you add an image it\'ll show up here and update live as it\'s processed.</div>';
    return;
  }
  q.innerHTML = '';
  state.order.forEach(id => {
    const img = state.images[id];
    const el = document.createElement('div');
    el.className = 'ticket' + (id === state.selectedId ? ' active' : '');
    el.setAttribute('role', 'button');
    el.setAttribute('tabindex', '0');
    const issues = img.results ? (img.results.issues_found || []).length : null;
    el.innerHTML = `
      <img class="ticket-thumb" src="${img.thumb}" alt="${escHtml(img.filename)}">
      <div class="ticket-body">
        <div class="ticket-id">${escHtml(img.filename)}</div>
        <div class="ticket-meta">
          <span class="status-chip ${img.status}">${img.status}</span>
          ${issues !== null ? `<span class="issue-count">${issues} issue${issues === 1 ? '' : 's'}</span>` : ''}
        </div>
      </div>
    `;
    el.addEventListener('click', () => selectImage(id));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') selectImage(id); });
    q.appendChild(el);
  });
}

// ── Detail render ─────────────────────────────────────────────────────────────
function selectImage(id) {
  state.selectedId = id;
  renderQueue();
  renderDetail(id);
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function checkVisual(check) {
  if (check.details && check.details.verdict === 'check_error') return 'error';
  return check.passed ? 'pass' : 'fail';
}

/**
 * Build a human-readable one-liner from a check's details dict.
 * The backend stores structured dicts — we pick the most useful field.
 */
function humanDetail(check) {
  const d = check.details || {};
  const name = check.check_name;

  if (d.verdict === 'check_error') return `Check error: ${d.error || 'unknown'}`;

  if (name === 'blur') {
    return d.laplacian_variance !== undefined
      ? `Laplacian variance: ${Number(d.laplacian_variance).toFixed(1)} (threshold ${d.threshold})`
      : '';
  }
  if (name === 'brightness') {
    return d.mean_intensity !== undefined
      ? `Mean intensity: ${Number(d.mean_intensity).toFixed(1)} — ${(d.verdict || '').replace(/_/g, ' ')}`
      : '';
  }
  if (name === 'duplicate') {
    return d.hamming_distance !== undefined
      ? `Hamming distance: ${d.hamming_distance} (threshold ≤${d.hamming_threshold}) · compared ${d.compared_against ?? '?'} images`
      : '';
  }
  if (name === 'screenshot') {
    const parts = [];
    if (d.has_camera_exif !== undefined) parts.push(d.has_camera_exif ? 'has EXIF' : 'no EXIF');
    if (d.matched_screen_ratio) parts.push(`matches ${d.matched_screen_ratio} ratio`);
    if (d.image_dimensions) parts.push(`${d.image_dimensions.width}×${d.image_dimensions.height}`);
    return parts.join(' · ');
  }
  if (name === 'plate_ocr') {
    if (d.matched_plate) return `Plate detected: ${d.matched_plate}`;
    if (d.verdict === 'no_text_extracted') return 'No text found in image';
    if (d.raw_ocr_text) return `Text found but no plate match — saw: "${d.raw_ocr_text.trim().slice(0, 60)}"`;
    return d.verdict ? d.verdict.replace(/_/g, ' ') : '';
  }
  return d.verdict ? d.verdict.replace(/_/g, ' ') : '';
}

function renderDetail(id) {
  const img = state.images[id];
  const main = $('#main');
  if (!img) return;

  const statusChip = `<span class="status-chip ${img.status}">${img.status}</span>`;
  const isProcessing = img.status === 'pending' || img.status === 'processing';
  const checks = img.results ? (img.results.checks || []) : null;
  const issues = img.results ? (img.results.issues_found || []) : [];

  // ── Header ─────────────────────────────────────────────────────────────────
  const checksRun = checks ? checks.length : '—';
  const issueCount = img.results ? issues.length : '—';

  const head = `
    <div class="detail-head">
      <div class="detail-image-wrap">
        <img src="${img.thumb}" alt="${escHtml(img.filename)}">
        ${isProcessing ? '<div class="scan-line"></div>' : ''}
      </div>
      <div class="detail-info">
        <div class="detail-eyebrow">image · <span style="letter-spacing:0">${escHtml(id)}</span></div>
        <div class="detail-title">${escHtml(img.filename)}</div>
        <div class="detail-status-row">${statusChip}</div>
        <div class="detail-meta-grid">
          <div class="meta-item">
            <div class="k">Checks run</div>
            <div class="v">${checksRun}</div>
          </div>
          <div class="meta-item">
            <div class="k">Issues flagged</div>
            <div class="v">${issueCount}</div>
          </div>
          <div class="meta-item">
            <div class="k">Hash</div>
            <div class="v">${img.results && img.results.image_hash ? img.results.image_hash.slice(0, 12) + '…' : '—'}</div>
          </div>
        </div>
        ${img.status === 'failed' ? `<div class="fail-banner">${escHtml(img.failure_reason || 'Processing failed — no reason returned by API')}</div>` : ''}
      </div>
    </div>
  `;

  // ── Body ───────────────────────────────────────────────────────────────────
  let body = '';

  if (isProcessing) {
    body = `
      <div class="section-label">Waiting on worker</div>
      <div class="placeholder" style="min-height:160px;">
        <p>Polling <code style="font-size:11px">/images/${escHtml(id)}/status</code> every 1.5 s — updates automatically.</p>
      </div>
    `;
  } else if (img.status === 'failed') {
    body = `<div class="section-label">No results — processing failed before checks completed</div>`;
  } else if (checks && checks.length) {
    // Issues summary banner
    const bannerClass = issues.length === 0 ? 'clean' : '';
    const pillsHtml = issues.map(n => `<span class="issue-pill">${escHtml(n.replace(/_/g, ' '))}</span>`).join('');
    const bannerText = issues.length === 0
      ? '<span class="ib-label">✓ All checks passed</span>'
      : `<span class="ib-label">Issues flagged</span>${pillsHtml}`;

    const tagsHtml = checks.map(c => {
      const kind = checkVisual(c);
      const label = kind === 'pass' ? 'PASS' : (kind === 'error' ? 'ERROR' : 'FLAGGED');
      const score = typeof c.score === 'number' ? c.score : null;
      const pct = score !== null ? Math.round(score * 100) : 0;
      const detail = humanDetail(c);
      const rawJson = c.details ? JSON.stringify(c.details, null, 0) : '';

      return `
        <div class="tag ${kind}">
          <div class="tag-top">
            <div class="tag-name">${escHtml((c.check_name || '').replace(/_/g, ' '))}</div>
            <div class="stamp">${label}</div>
          </div>
          ${score !== null ? `
          <div class="tag-score-row">
            <div class="score-bar"><div class="score-fill" style="width:${pct}%"></div></div>
            <div class="score-num">${score.toFixed(2)}</div>
          </div>` : ''}
          ${detail ? `<div class="tag-detail">${escHtml(detail)}</div>` : ''}
          ${rawJson ? `<div class="tag-raw">${escHtml(rawJson)}</div>` : ''}
        </div>
      `;
    }).join('');

    body = `
      <div class="issues-banner ${bannerClass}">${bannerText}</div>
      <div class="section-label">Per-check results</div>
      <div class="tags">${tagsHtml}</div>
    `;
  } else {
    body = `<div class="section-label">No per-check data returned yet</div>`;
  }

  main.innerHTML = head + body;
}

// ── Init ──────────────────────────────────────────────────────────────────────
// Auto-detect: if served from the FastAPI origin, leave apiBase blank (same origin).
// If opened as a local file, default to localhost:8000.
(function init() {
  const isFileProtocol = window.location.protocol === 'file:';
  if (isFileProtocol) {
    apiBaseInput.value = 'http://localhost:8000';
  } else {
    // Served by FastAPI — use same origin, leave field blank as hint
    apiBaseInput.placeholder = window.location.origin + ' (auto)';
  }
  checkHealth();
  setInterval(checkHealth, 8000);
  apiBaseInput.addEventListener('change', checkHealth);
})();
</script>
</body>
